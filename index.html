<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイナ保険証 ニュースキュレーション</title>
  <!-- セキュリティ: リンク先に参照元URLを送らない / iframe埋め込みを禁止 -->
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <link rel="icon" type="image/png" href="myna-chan.png">
  <link rel="apple-touch-icon" href="myna-chan.png">
  <!-- OGP / Twitter Card -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://myna-news-jp.github.io/">
  <meta property="og:title"       content="マイナ保険証 ニュースキュレーション">
  <meta property="og:description" content="マイナ保険証・マイナンバーカードに関する最新ニュースを毎日自動収集。NHK・Yahoo・厚労省・デジタル庁など全媒体横断でお届けします。">
  <meta property="og:image"       content="https://myna-news-jp.github.io/myna-chan.png">
  <meta property="og:locale"      content="ja_JP">
  <meta name="twitter:card"       content="summary">
  <meta name="twitter:title"      content="マイナ保険証 ニュースキュレーション">
  <meta name="twitter:description" content="マイナ保険証に関する最新ニュースを毎日自動収集してお届けします。">
  <meta name="twitter:image"      content="https://myna-news-jp.github.io/myna-chan.png">
  <meta name="description"        content="マイナ保険証・マイナンバーカードに関する最新ニュースを毎日自動収集。全媒体横断でお届けします。">
  <style>
    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface2: #f7f9fc;
      --border: #e2e8f0;
      --text: #1a202c;
      --text-muted: #718096;
      --accent: #2b6cb0;
      --accent-light: #ebf4ff;
      --accent-hover: #2c5282;
      --tag-bg: #e9f0fa;
      --tag-text: #2b6cb0;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --shadow-hover: 0 4px 12px rgba(0,0,0,.12);
      --radius: 10px;
    }
    [data-theme="dark"] {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #162032;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #60a5fa;
      --accent-light: #1e3a5f;
      --accent-hover: #93c5fd;
      --tag-bg: #1e3a5f;
      --tag-text: #93c5fd;
      --shadow: 0 1px 3px rgba(0,0,0,.3);
      --shadow-hover: 0 4px 12px rgba(0,0,0,.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic UI",
        "Meiryo", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background .2s, color .2s;
    }

    /* ─── Header ─────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 16px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }
    .logo-sub {
      font-size: 10px;
      font-weight: 400;
      color: var(--text-muted);
    }
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .theme-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 16px;
      color: var(--text);
      transition: background .15s;
    }
    .theme-btn:hover { background: var(--surface2); }

    /* ─── Controls ───────────────────────────────── */
    .controls {
      max-width: 960px;
      margin: 20px auto 0;
      padding: 0 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .search-box {
      position: relative;
      flex: 1;
      min-width: 200px;
    }
    .search-icon {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 9px 12px 9px 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }
    .filter-select {
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }

    /* ─── 更新ボタン（クールダウン対応） ─────────── */
    .refresh-btn {
      min-width: 96px;
      padding: 9px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      white-space: nowrap;
      position: relative;
      overflow: hidden;
    }
    .refresh-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .refresh-btn:disabled {
      cursor: not-allowed;
      opacity: .7;
    }
    .refresh-btn .btn-spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 5px;
    }
    .refresh-btn .cd-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 3px;
      background: rgba(255,255,255,.5);
      transition: width 1s linear;
    }

    /* ─── Stats bar ──────────────────────────────── */
    .stats-bar {
      max-width: 960px;
      margin: 12px auto 0;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .stats-text { font-size: 13px; color: var(--text-muted); }
    .updated-text { font-size: 12px; color: var(--text-muted); margin-left: auto; }

    /* ─── ページネーション ───────────────────────── */
    .pagination-wrap {
      max-width: 960px;
      margin: 12px auto 4px;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .pagination-wrap.bottom { margin: 4px auto 40px; }
    .pagination-info {
      font-size: 13px;
      color: var(--text-muted);
    }
    .pagination-btns {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .page-btn {
      min-width: 36px;
      height: 36px;
      padding: 0 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .page-btn:hover:not(:disabled):not(.active) {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent);
    }
    .page-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: default;
    }
    .page-btn:disabled {
      opacity: .4;
      cursor: not-allowed;
    }
    .page-ellipsis {
      min-width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: var(--text-muted);
      pointer-events: none;
    }

    /* ─── Article list ───────────────────────────── */
    .article-list {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ─── Card ───────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px 18px;
      transition: box-shadow .15s, transform .1s;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-1px);
    }
    /* サムネイル（右側） */
    .card-thumb {
      width: 110px;
      height: 74px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
      align-self: flex-start;
      background: var(--surface2);
      order: 2;
    }
    /* テキストコンテンツ（左側・flex:1） */
    .card-body {
      flex: 1;
      min-width: 0;
      order: 1;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 5px;
    }
    .card-title a {
      color: var(--text);
      text-decoration: none;
    }
    .card-title a:hover { color: var(--accent); text-decoration: underline; }
    .card-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .card-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .source-tag {
      font-size: 11px;
      font-weight: 600;
      background: var(--tag-bg);
      color: var(--tag-text);
      padding: 2px 8px;
      border-radius: 20px;
    }
    .date-text { font-size: 12px; color: var(--text-muted); }
    .new-badge {
      font-size: 10px;
      font-weight: 700;
      background: #e53e3e;
      color: #fff;
      padding: 1px 6px;
      border-radius: 4px;
      letter-spacing: .05em;
    }

    /* ─── アコーディオン（同内容記事） ───────────── */
    .dup-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      background: #f0fff4;
      color: #276749;
      border: 1px solid #9ae6b4;
      padding: 2px 8px;
      border-radius: 20px;
      cursor: pointer;
      transition: background .15s;
      user-select: none;
      line-height: 1.6;
    }
    [data-theme="dark"] .dup-badge {
      background: #1c4532;
      color: #9ae6b4;
      border-color: #276749;
    }
    .dup-badge:hover { background: #c6f6d5; }
    [data-theme="dark"] .dup-badge:hover { background: #22543d; }
    .dup-arrow { display: inline-block; transition: transform .2s; font-style: normal; }
    .dup-badge.open .dup-arrow { transform: rotate(180deg); }

    .accordion-body {
      margin-top: 10px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
      display: none;
    }
    .accordion-body.open { display: block; }
    .accordion-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 6px;
    }
    .accordion-item {
      padding: 7px 0;
      border-bottom: 1px dashed var(--border);
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .accordion-item:last-child { border-bottom: none; }
    .accordion-item a {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      line-height: 1.5;
    }
    .accordion-item a:hover { text-decoration: underline; }
    .accordion-item-meta {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* ─── Empty / Loading ────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 16px;
      color: var(--text-muted);
    }
    .empty-state h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 14px; line-height: 1.7; }
    .empty-state code {
      background: var(--surface2);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
    }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 60px;
      color: var(--text-muted);
      font-size: 15px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }


    /* ─── ヒーローバナー ─────────────────────────── */
    .hero {
      background: linear-gradient(120deg, #1255a8 0%, #1976d2 45%, #42a5f5 100%);
      overflow: hidden;
    }
    .hero-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px 40px 0;
      display: flex;
      align-items: flex-end;
      gap: 0;
    }
    .hero-text {
      flex: 1;
      padding-bottom: 24px;
      color: #fff;
    }
    .hero-title {
      font-size: 30px;
      font-weight: 900;
      line-height: 1.25;
      margin-bottom: 10px;
      letter-spacing: -.03em;
    }
    .hero-title small {
      display: block;
      font-size: 13px;
      font-weight: 500;
      opacity: .8;
      letter-spacing: .02em;
      margin-bottom: 4px;
    }
    .hero-desc {
      font-size: 13px;
      opacity: .82;
      line-height: 1.8;
    }
    .hero-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .hero-badge {
      font-size: 11px;
      font-weight: 700;
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.35);
      color: #fff;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: .04em;
    }
    .hero-mascot {
      flex-shrink: 0;
      line-height: 0;
      background: rgba(255,255,255,0.92);
      border-radius: 50%;
      padding: 14px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.18);
      overflow: hidden;
    }
    .hero-mascot img {
      display: block;
      width: 200px;
      height: 200px;
      object-fit: contain;
      border-radius: 50%;
    }

    /* ─── シェアボタン ────────────────────────────── */
    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      background: none;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 2px 9px;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s, color .15s, border-color .15s;
      margin-left: auto;
      white-space: nowrap;
    }
    .share-btn:hover {
      background: var(--accent-light);
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ─── トースト通知 ───────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #2d3748;
      color: #fff;
      padding: 10px 22px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      z-index: 9999;
      opacity: 0;
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,.25);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    [data-theme="dark"] .toast { background: #e2e8f0; color: #1a202c; }

    /* ─── 既読記事 ──────────────────────────────── */
    .card--read { opacity: 0.52; }
    .card--read:hover { opacity: 0.75; }
    .card--read .card-title a { color: var(--text-muted); }
    .read-clear-btn {
      font-size: 11px;
      color: var(--text-muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s, color .15s;
    }
    .read-clear-btn:hover { background: var(--surface2); color: var(--text); }

    /* ─── トップへ戻るボタン ─────────────────────── */
    .back-top {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 44px;
      height: 44px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 3px 12px rgba(0,0,0,.25);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .25s, transform .25s, background .15s;
      z-index: 200;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .back-top.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .back-top:hover { background: var(--accent-hover); }

    @media (max-width: 700px) {
      .controls { flex-direction: column; align-items: stretch; }
      .refresh-btn { width: 100%; }
      .pagination-btns { gap: 3px; }
      .page-btn { min-width: 32px; height: 32px; font-size: 12px; }
      .hero-inner { padding: 18px 20px 0; }
      .hero-title { font-size: 22px; }
      .hero-mascot { padding: 10px; }
      .hero-mascot img { width: 120px; height: 120px; }
      .back-top { bottom: 20px; right: 12px; width: 38px; height: 38px; font-size: 16px; }
      .card-thumb { width: 80px; height: 54px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="#">
      <div class="logo-icon">🏥</div>
      <div>
        <div class="logo-text">マイナ保険証 ニュース</div>
        <div class="logo-sub">キュレーションサイト</div>
      </div>
    </a>
    <div class="header-right">
      <button class="theme-btn" id="themeBtn" title="ダーク/ライト切替">🌙</button>
    </div>
  </div>
</header>

<!-- ─── ヒーローバナー ─────────────────────────────── -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-text">
      <div class="hero-title">
        <small>📋 マイナンバー・マイナ保険証</small>
        ニュース<br>キュレーション
      </div>
      <p class="hero-desc">
        マイナ保険証に関する最新ニュースを<br>
        毎日自動収集してお届けします。
      </p>
      <div class="hero-badges">
        <span class="hero-badge">📅 毎日自動更新</span>
        <span class="hero-badge">🔍 全媒体横断</span>
        <span class="hero-badge">📤 簡単シェア</span>
      </div>
    </div>
    <div class="hero-mascot">
      <img src="myna-chan.png" alt="マイナちゃん"
           onerror="this.style.display='none'">
    </div>
  </div>
</div>


<div class="controls">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="searchInput"
      placeholder="タイトル・記事内容で絞り込み…" autocomplete="off">
  </div>
  <select class="filter-select" id="periodFilter">
    <option value="all" selected>全期間</option>
    <option value="today">今日</option>
    <option value="3days">直近3日</option>
    <option value="week">直近1週間</option>
    <option value="month">直近1ヶ月</option>
  </select>
  <select class="filter-select" id="sourceFilter">
    <option value="all">すべての媒体</option>
  </select>
  <button class="refresh-btn" id="refreshBtn" title="保存済みデータを再読込します（新記事の取得は fetch_news.py を実行してください）">↻ データ再読込</button>
</div>

<div class="stats-bar">
  <span class="stats-text" id="statsText">読み込み中…</span>
  <button class="read-clear-btn" id="readClearBtn" style="display:none" title="既読をすべてリセット">既読クリア</button>
  <span class="updated-text" id="updatedText"></span>
</div>

<!-- ページネーション（上） -->
<div class="pagination-wrap" id="paginationTop" style="display:none"></div>

<!-- 記事一覧 -->
<div class="article-list" id="articleList">
  <div class="loading"><div class="spinner"></div><span>読み込んでいます…</span></div>
</div>

<!-- ページネーション（下） -->
<div class="pagination-wrap bottom" id="paginationBottom" style="display:none"></div>

<!-- トップへ戻るボタン -->
<button class="back-top" id="backTopBtn" title="トップへ戻る" aria-label="トップへ戻る">↑</button>

<script>
(function () {
  const PAGE_SIZE     = 20;   // 1ページに表示するグループ数
  const COOLDOWN_SECS = 10;   // 更新ボタン連打防止（秒）

  // ─── Theme ───────────────────────────────────────────────────────────────
  const savedTheme = localStorage.getItem("theme") || "light";
  document.documentElement.setAttribute("data-theme", savedTheme);
  const themeBtn = document.getElementById("themeBtn");
  themeBtn.textContent = savedTheme === "dark" ? "☀️" : "🌙";
  themeBtn.addEventListener("click", () => {
    const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    localStorage.setItem("theme", next);
    themeBtn.textContent = next === "dark" ? "☀️" : "🌙";
  });

  // ─── State ───────────────────────────────────────────────────────────────
  let allArticles      = [];   // 全件
  let filteredGroups   = [];   // フィルタ後のグループ配列
  let currentPage      = 1;    // 現在のページ（1始まり）
  let isFirstRender    = true; // 初回ロード判定（スクロールしない）

  // ─── 既読管理 ─────────────────────────────────────────────────────────────
  const READ_KEY = "myna_read_urls";
  let readSet = new Set();

  function loadReadSet() {
    try { readSet = new Set(JSON.parse(localStorage.getItem(READ_KEY) || "[]")); }
    catch { readSet = new Set(); }
    document.getElementById("readClearBtn").style.display =
      readSet.size > 0 ? "inline-block" : "none";
  }

  function markRead(url) {
    readSet.add(url);
    const arr = [...readSet].slice(-1000); // 最大1000件保持
    try { localStorage.setItem(READ_KEY, JSON.stringify(arr)); } catch {}
    document.getElementById("readClearBtn").style.display = "inline-block";
  }

  document.getElementById("readClearBtn").addEventListener("click", () => {
    readSet.clear();
    try { localStorage.removeItem(READ_KEY); } catch {}
    document.getElementById("readClearBtn").style.display = "none";
    renderCurrentPage();
  });

  // ─── データ取得 ──────────────────────────────────────────────────────────
  async function loadData(path) {
    try {
      const res = await fetch(path, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    } catch (e) {
      return null;
    }
  }

  async function init() {
    loadReadSet();

    // Step 1: 最新50件（news_latest.json）を先に表示して体感速度を上げる
    const latest = await loadData("news_latest.json");
    if (latest && latest.articles && latest.articles.length > 0) {
      applyData(latest);
    } else {
      // fallback: 直接フル読込
      const data = await loadData("news_data.json");
      if (!data || !data.articles || data.articles.length === 0) {
        showEmpty();
        return;
      }
      applyData(data);
      return;
    }

    // Step 2: バックグラウンドでフルデータを読み込んで差し替え
    setTimeout(async () => {
      const data = await loadData("news_data.json");
      if (data && data.articles && data.articles.length > (latest.articles.length)) {
        applyData(data);
      }
    }, 0);
  }

  function applyData(data) {
    // pub_date 降順（最新が先頭）で並び替え
    allArticles = (data.articles || []).slice().sort((a, b) => {
      const da = a.pub_date ? new Date(a.pub_date).getTime() : 0;
      const db = b.pub_date ? new Date(b.pub_date).getTime() : 0;
      return db - da;
    });

    if (data.updated) {
      document.getElementById("updatedText").textContent =
        "最終更新: " + formatDateJP(new Date(data.updated));
    }

    // 媒体フィルターを再構築
    const srcSel = document.getElementById("sourceFilter");
    const prevVal = srcSel.value;
    while (srcSel.options.length > 1) srcSel.remove(1);
    const sources = [...new Set(allArticles.map(a => a.source).filter(Boolean))].sort();
    sources.forEach(s => {
      const opt = document.createElement("option");
      opt.value = s; opt.textContent = s;
      srcSel.appendChild(opt);
    });
    if ([...srcSel.options].some(o => o.value === prevVal)) srcSel.value = prevVal;

    applyFilters();
  }

  // ─── グルーピング ─────────────────────────────────────────────────────────
  // 同一内容の記事を束ねる。タイトル先頭30文字（正規化）をキーとして使用。
  function groupArticles(articles) {
    const map = new Map();
    articles.forEach(a => {
      // タイトル先頭30文字で正規化キーを生成
      const key = a.title.slice(0, 30).toLowerCase().replace(/[\s\u3000\u00a0]/g, "");
      if (!map.has(key)) {
        map.set(key, []);
      }
      map.get(key).push(a);
    });
    return Array.from(map.values());
  }

  // ─── フィルタ ─────────────────────────────────────────────────────────────
  function applyFilters() {
    const query  = document.getElementById("searchInput").value.trim().toLowerCase();
    const period = document.getElementById("periodFilter").value;
    const source = document.getElementById("sourceFilter").value;

    const now = new Date();
    const cutoffs = {
      today:   new Date(now.getFullYear(), now.getMonth(), now.getDate()),
      "3days": new Date(now - 3 * 86400000),
      week:    new Date(now - 7 * 86400000),
      month:   new Date(now - 30 * 86400000),
    };
    const cutoff = cutoffs[period] || null;

    const filtered = allArticles.filter(a => {
      if (source !== "all" && a.source !== source) return false;
      if (cutoff) {
        const d = new Date(a.pub_date);
        if (isNaN(d) || d < cutoff) return false;
      }
      if (query) {
        const hay = (a.title + " " + a.description + " " + a.source).toLowerCase();
        return query.split(/\s+/).every(w => hay.includes(w));
      }
      return true;
    });

    filteredGroups = groupArticles(filtered);
    currentPage = 1;
    renderCurrentPage();
  }

  // ─── ページ描画 ────────────────────────────────────────────────────────────
  function renderCurrentPage() {
    const list        = document.getElementById("articleList");
    const period      = document.getElementById("periodFilter").value;
    const topWrap     = document.getElementById("paginationTop");
    const bottomWrap  = document.getElementById("paginationBottom");
    const totalGroups = filteredGroups.length;
    const totalPages  = Math.ceil(totalGroups / PAGE_SIZE);

    if (totalGroups === 0) {
      list.innerHTML = `<div class="empty-state">
        <h2>該当する記事が見つかりません</h2>
        <p>「直近1週間」に切り替えるか、<code>python fetch_news.py</code> を実行して最新記事を取得してください。</p>
      </div>`;
      topWrap.style.display    = "none";
      bottomWrap.style.display = "none";
      updateStats(0, 0);
      return;
    }


    // ── ページスライス ──
    const start = (currentPage - 1) * PAGE_SIZE;
    const end   = Math.min(start + PAGE_SIZE, totalGroups);
    const slice = filteredGroups.slice(start, end);

    // ── 記事リスト描画 ──
    const now          = new Date();
    const newThreshold = new Date(now - 24 * 3600000);
    list.innerHTML     = "";

    slice.forEach((group, groupIdx) => {
      const main     = group[0];
      const dups     = group.slice(1);
      const pubDate  = new Date(main.pub_date);
      const isNew    = !isNaN(pubDate) && pubDate > newThreshold;
      const dateStr  = isNaN(pubDate) ? "" : formatDateJP(pubDate);
      const uid      = `acc-${start + groupIdx}`;
      const isRead   = readSet.has(main.link);

      const card = document.createElement("div");
      card.className = "card" + (isRead ? " card--read" : "");

      const articleHref = "redirect.html?url=" + encodeURIComponent(main.link);

      // アコーディオン部分（同内容記事がある場合のみ）
      let dupHtml = "";
      if (dups.length > 0) {
        const dupItems = dups.map(d => {
          const dDate   = new Date(d.pub_date);
          const dDateStr = isNaN(dDate) ? "" : formatDateJP(dDate);
          const dHref   = "redirect.html?url=" + encodeURIComponent(d.link);
          return `
            <div class="accordion-item">
              <a href="${escHtml(dHref)}" target="_blank" rel="noopener noreferrer">${escHtml(d.title)}</a>
              <div class="accordion-item-meta">
                ${d.source ? `<span>${escHtml(d.source)}</span>` : ""}
                ${dDateStr  ? `<span>${dDateStr}</span>` : ""}
              </div>
            </div>`;
        }).join("");

        dupHtml = `
          <div class="accordion-body" id="${uid}">
            <div class="accordion-label">同内容の他記事</div>
            ${dupItems}
          </div>`;
      }

      card.innerHTML = `
        <div class="card-body">
          <div class="card-title">
            <a href="${escHtml(articleHref)}" target="_blank" rel="noopener noreferrer">
              ${escHtml(main.title)}
            </a>
          </div>
          ${main.description ? `<div class="card-desc">${escHtml(main.description)}</div>` : ""}
          <div class="card-footer">
            ${main.source ? `<span class="source-tag">${escHtml(main.source)}</span>` : ""}
            ${dateStr      ? `<span class="date-text">${dateStr}</span>` : ""}
            ${isNew        ? `<span class="new-badge">NEW</span>` : ""}
            ${dups.length > 0
              ? `<button class="dup-badge" onclick="toggleAccordion('${uid}',this)" aria-expanded="false">
                   同内容 ${dups.length + 1}件
                   <i class="dup-arrow">▼</i>
                 </button>`
              : ""}
            <button class="share-btn" title="記事URLと要約をコピー">📤 シェア</button>
          </div>
          ${dupHtml}
        </div>
        ${main.thumbnail ? `<img class="card-thumb" src="${escHtml(main.thumbnail)}" alt="" loading="lazy">` : ""}`;

      // サムネイル読み込み失敗時は非表示
      const thumbEl = card.querySelector(".card-thumb");
      if (thumbEl) thumbEl.addEventListener("error", () => { thumbEl.style.display = "none"; });

      // タイトルリンクをクリックしたら既読マーク
      const titleLink = card.querySelector(".card-title a");
      if (titleLink) {
        titleLink.addEventListener("click", () => {
          markRead(main.link);
          card.classList.add("card--read");
        });
      }

      // アコーディオン内リンクも既読マーク
      card.querySelectorAll(".accordion-item a").forEach(a => {
        a.addEventListener("click", () => {
          const href = new URLSearchParams(new URL(a.href).search).get("url") || a.href;
          markRead(href);
        });
      });

      // シェアボタンにイベントを設定（クロージャでデータをキャプチャ）
      const shareBtn = card.querySelector(".share-btn");
      if (shareBtn) {
        // summary があれば優先、なければ description にフォールバック
        const summaryText = (main.summary || main.description || "").trim();
        shareBtn.addEventListener("click", () => {
          shareArticle(main.title, main.source, dateStr, main.link, summaryText);
        });
      }

      list.appendChild(card);
    });

    // ── ページネーション描画 ──
    const totalArticles = filteredGroups.reduce((s, g) => s + g.length, 0);
    topWrap.style.display    = totalPages > 1 ? "flex" : "none";
    bottomWrap.style.display = totalPages > 1 ? "flex" : "none";
    renderPagination(currentPage, totalPages, totalGroups, start + 1, end, "paginationTop");
    renderPagination(currentPage, totalPages, totalGroups, start + 1, end, "paginationBottom");

    updateStats(totalGroups, totalArticles);

    // ページ切替時はリスト上部へスクロール（初回ロードはスキップ）
    if (!isFirstRender) {
      document.getElementById("paginationTop").scrollIntoView({ behavior: "smooth", block: "start" });
    }
    isFirstRender = false;
  }

  // ─── ページネーションHTML生成 ─────────────────────────────────────────────
  function renderPagination(current, total, totalGroups, rangeFrom, rangeTo, containerId) {
    const wrap = document.getElementById(containerId);
    wrap.innerHTML = "";

    // 件数情報
    const info = document.createElement("div");
    info.className = "pagination-info";
    info.textContent = `${rangeFrom}〜${rangeTo}グループ / 全 ${totalGroups} グループ`;
    wrap.appendChild(info);

    if (total <= 1) return;

    // ボタン群
    const btns = document.createElement("div");
    btns.className = "pagination-btns";

    // 前へ
    btns.appendChild(makePageBtn("‹ 前へ", current - 1, current <= 1));

    // ページ番号（エリプシス付き）
    const pages = calcPageRange(current, total);
    pages.forEach(p => {
      if (p === "…") {
        const el = document.createElement("span");
        el.className = "page-ellipsis";
        el.textContent = "…";
        btns.appendChild(el);
      } else {
        const btn = makePageBtn(String(p), p, false);
        if (p === current) btn.classList.add("active");
        btns.appendChild(btn);
      }
    });

    // 次へ
    btns.appendChild(makePageBtn("次へ ›", current + 1, current >= total));

    wrap.appendChild(btns);
  }

  // 表示するページ番号リストを計算（エリプシスあり）
  function calcPageRange(current, total) {
    if (total <= 9) {
      return Array.from({ length: total }, (_, i) => i + 1);
    }
    const pages = [];
    const delta = 2; // 現在ページ前後に表示する数

    const left  = Math.max(2, current - delta);
    const right = Math.min(total - 1, current + delta);

    pages.push(1);
    if (left > 2)      pages.push("…");
    for (let p = left; p <= right; p++) pages.push(p);
    if (right < total - 1) pages.push("…");
    pages.push(total);

    return pages;
  }

  function makePageBtn(label, targetPage, disabled) {
    const btn = document.createElement("button");
    btn.className = "page-btn";
    btn.textContent = label;
    btn.disabled = disabled;
    if (!disabled) {
      btn.addEventListener("click", () => goToPage(targetPage));
    }
    return btn;
  }

  function goToPage(page) {
    const total = Math.ceil(filteredGroups.length / PAGE_SIZE);
    currentPage = Math.max(1, Math.min(page, total));
    renderCurrentPage();
  }

  // ─── シェア機能 ──────────────────────────────────────────────────────────
  function shareArticle(title, source, dateStr, link, description) {
    const lines = [];
    lines.push(`📰 ${title}`);
    const meta = [source, dateStr].filter(Boolean).join("  |  ");
    if (meta) lines.push(`📌 ${meta}`);
    lines.push(`🔗 ${link}`);
    const desc = (description || "").trim();
    if (desc) {
      // 文の区切り（。！？）を優先して150文字以内に収める
      const MAX = 150;
      let truncated = desc;
      if (desc.length > MAX) {
        // MAX文字以内で最後の文末句読点を探す
        const cut = desc.slice(0, MAX);
        const lastPunct = Math.max(cut.lastIndexOf("。"), cut.lastIndexOf("！"), cut.lastIndexOf("？"));
        truncated = lastPunct > MAX * 0.5
          ? desc.slice(0, lastPunct + 1)   // 句読点で綺麗に切る
          : cut.trimEnd() + "…";           // 句読点がなければ…で締める
      }
      lines.push("");
      lines.push(`📝 要約：${truncated}`);
    }
    const text = lines.join("\n");

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text)
        .then(() => showToast("📋 クリップボードにコピーしました！"))
        .catch(() => fallbackCopy(text));
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.cssText = "position:fixed;opacity:0;pointer-events:none;";
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand("copy");
      showToast("📋 コピーしました！");
    } catch {
      showToast("⚠️ コピーに失敗しました");
    }
    document.body.removeChild(ta);
  }

  function showToast(msg) {
    let toast = document.getElementById("shareToast");
    if (!toast) {
      toast = document.createElement("div");
      toast.id = "shareToast";
      toast.className = "toast";
      document.body.appendChild(toast);
    }
    toast.textContent = msg;
    // リセットしてから表示（連続クリック対応）
    toast.classList.remove("show");
    requestAnimationFrame(() => {
      toast.classList.add("show");
      clearTimeout(toast._hideTimer);
      toast._hideTimer = setTimeout(() => toast.classList.remove("show"), 2200);
    });
  }

  // ─── アコーディオン ───────────────────────────────────────────────────────
  window.toggleAccordion = function(uid, btn) {
    const body = document.getElementById(uid);
    if (!body) return;
    const isOpen = body.classList.toggle("open");
    btn.classList.toggle("open", isOpen);
    btn.setAttribute("aria-expanded", String(isOpen));
  };

  // ─── Stats ──────────────────────────────────────────────────────────────
  function updateStats(groupCount, articleCount) {
    const total = allArticles.length;
    if (groupCount === 0) {
      document.getElementById("statsText").textContent =
        `該当なし（全 ${total} 件）`;
    } else if (groupCount === articleCount) {
      document.getElementById("statsText").textContent =
        `${groupCount} 件（全 ${total} 件）`;
    } else {
      document.getElementById("statsText").textContent =
        `${groupCount} グループ・${articleCount} 件（全 ${total} 件）`;
    }
  }

  // ─── 更新ボタン（クールダウン付き） ─────────────────────────────────────
  const refreshBtn = document.getElementById("refreshBtn");
  let cdTimer = null;

  function startCooldown() {
    let remaining = COOLDOWN_SECS;
    refreshBtn.disabled = true;

    let bar = refreshBtn.querySelector(".cd-bar");
    if (!bar) {
      bar = document.createElement("span");
      bar.className = "cd-bar";
      refreshBtn.appendChild(bar);
    }
    bar.style.width = "100%";

    cdTimer = setInterval(() => {
      remaining--;
      bar.style.width = `${(remaining / COOLDOWN_SECS) * 100}%`;
      if (remaining <= 0) {
        clearInterval(cdTimer);
        cdTimer = null;
        refreshBtn.disabled = false;
        refreshBtn.innerHTML = "↻ データ再読込";
      } else {
        refreshBtn.innerHTML =
          `<span class="cd-bar" style="width:${(remaining / COOLDOWN_SECS) * 100}%"></span>` +
          `↻ 更新 (${remaining}秒)`;
      }
    }, 1000);
  }

  refreshBtn.addEventListener("click", async () => {
    if (refreshBtn.disabled) return;
    refreshBtn.innerHTML = `<span class="btn-spinner"></span>読込中`;
    refreshBtn.disabled = true;
    const data = await loadData();
    if (data && data.articles) {
      applyData(data);
    }
    startCooldown();
  });

  // ─── イベント ─────────────────────────────────────────────────────────────
  document.getElementById("searchInput").addEventListener("input",  applyFilters);
  document.getElementById("periodFilter").addEventListener("change", applyFilters);
  document.getElementById("sourceFilter").addEventListener("change", applyFilters);

  // ─── ユーティリティ ───────────────────────────────────────────────────────
  function showEmpty() {
    document.getElementById("articleList").innerHTML = `
      <div class="empty-state">
        <h2>📰 ニュースデータがまだありません</h2>
        <p>
          以下のコマンドを実行してニュースを取得してください：<br><br>
          <code>python fetch_news.py</code><br><br>
          または <code>run_daily.bat</code> をダブルクリックしてください。<br>
          取得後、このページを再読み込みすると記事が表示されます。
        </p>
      </div>`;
    document.getElementById("statsText").textContent = "データなし";
  }

  function formatDateJP(d) {
    const y  = d.getFullYear();
    const mo = String(d.getMonth() + 1).padStart(2, "0");
    const dy = String(d.getDate()).padStart(2, "0");
    const h  = String(d.getHours()).padStart(2, "0");
    const m  = String(d.getMinutes()).padStart(2, "0");
    return `${y}/${mo}/${dy} ${h}:${m}`;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  // ─── トップへ戻るボタン ───────────────────────────────────────────────────
  const backTopBtn = document.getElementById("backTopBtn");
  window.addEventListener("scroll", () => {
    backTopBtn.classList.toggle("show", window.scrollY > 300);
  }, { passive: true });
  backTopBtn.addEventListener("click", () => {
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  // ─── 起動 ─────────────────────────────────────────────────────────────────
  init();
})();
</script>
</body>
</html>
