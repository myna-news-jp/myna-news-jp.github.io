name: ニュース自動更新

on:
  schedule:
    # 毎日 9:00 JST (= 00:00 UTC) と 18:00 JST (= 09:00 UTC) に実行
    - cron: '0 0,9 * * *'
  workflow_dispatch:
    # GitHub 画面から手動実行も可能

permissions:
  contents: write   # news_data.json をコミットするために必要

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: ニュースを取得
        run: python fetch_news.py --force
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: news_data.json をコミット & プッシュ
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update news data [skip ci]'
          file_pattern: news_data.json
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
